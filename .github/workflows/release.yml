name: Release

# Сборка нативная на каждой платформе (CGO+tree-sitter не кросс-компилируется
# тривиально, поэтому используем нативные раннеры — фолбэк из плана миграции).
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - { os: ubuntu-latest,    goos: linux,   goarch: amd64 }
          - { os: ubuntu-24.04-arm, goos: linux,   goarch: arm64 }
          - { os: macos-13,         goos: darwin,  goarch: amd64 }
          - { os: macos-14,         goos: darwin,  goarch: arm64 }
          - { os: windows-latest,   goos: windows, goarch: amd64 }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Build
        shell: bash
        env:
          CGO_ENABLED: "1"
        run: |
          VERSION="${GITHUB_REF_NAME}"
          LDFLAGS="-s -w \
            -X github.com/uxname/kodu/internal/buildinfo.Version=${VERSION} \
            -X github.com/uxname/kodu/internal/buildinfo.Commit=${GITHUB_SHA::7} \
            -X github.com/uxname/kodu/internal/buildinfo.Date=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          BIN=kodu
          [ "${{ matrix.goos }}" = "windows" ] && BIN=kodu.exe
          go build -ldflags="$LDFLAGS" -o "$BIN" ./cmd/kodu
          NAME="kodu_${VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            7z a "${NAME}.zip" "$BIN" >/dev/null
          else
            tar -czf "${NAME}.tar.gz" "$BIN"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: kodu-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            kodu_*.tar.gz
            kodu_*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Checksums
        run: cd dist && sha256sum kodu_* > checksums.txt
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
