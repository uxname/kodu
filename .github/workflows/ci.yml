name: CI

on:
  push:
    branches: [master, go-migration]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Build (CGO для tree-sitter)
        env:
          CGO_ENABLED: "1"
        run: go build ./...
      - name: Test
        env:
          CGO_ENABLED: "1"
        run: go test ./...
      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
        env:
          CGO_ENABLED: "1"
