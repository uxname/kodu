# audit-baseline.yml
# Accepted/deferred risks. A match on check_id → status ⏸ ACCEPTED in the report.
# Copy to the project root: docs/audit-baseline.yml
#
# check_ids are stack-neutral: the same identifier applies to any
# runtime (Node/TS, Go, Python, Rust, Java). Stack specifics come from the
# profiles in skills/audit/stacks/<runtime>.md and do not affect check_id matching.

accepted:
  # Example:
  # - check_id: OWA-06
  #   file: src/app.ts          # Optional: limit to a specific file
  #   reason: "Rate limiting at the nginx level"
  #   type: accepted-risk        # accepted-risk | false-positive | intentional-design
  #   accepted_by: username
  #   accepted_date: 2026-01-01
  #   expires: 2026-12-31       # Optional: when to revisit

# ─────────────────────────────────────────
# False positives (the tool was wrong, no actual violation)
false_positives:
  # - check_id: ARC-03
  #   reason: "import cycle from prisma-generated client, not real cycle"
  #   type: false-positive

# Intentional architectural decisions (not bugs, a justified choice)
intentional:
  # - check_id: NAM-06
  #   reason: "utils.ts contains 3 tightly related helpers, intentional"
  #   type: intentional-design

# ─────────────────────────────────────────
# FULL LIST OF check_ids
# ─────────────────────────────────────────
#
# audit-secrets:
#   SEC-01  No hardcoded credentials in code (passwords, tokens, API keys, private keys)
#   SEC-02  Files with secrets are excluded from VCS (.env* in .gitignore)
#   SEC-03  Secrets are not passed via URL (query params, Basic Auth in URL)
#   SEC-04  .env.example contains only placeholder values with no real data
#   SEC-05  Dockerfile contains no secrets in ENV directives
#   SEC-06  Code comments contain no credentials
#   SEC-07  Automated secret scanning is configured (pre-commit or CI)
#
# audit-owasp:
#   OWA-01  A03: All queries to DB/OS/LDAP are parameterized, no injection
#   OWA-02  A01: All protected routes have auth middleware
#   OWA-03  A01: Resource ownership is checked, no IDOR
#   OWA-04  A02: Passwords are stored securely (bcrypt/argon2/scrypt)
#   OWA-05  A05: Secure server configuration (CORS, security headers, body limits)
#   OWA-06  A07: Brute-force protection (rate limiting on auth and sensitive endpoints)
#   OWA-07  A09: Technical information does not leak into responses (stack trace, internal paths)
#   OWA-08  A10: URLs from user input are not passed to the HTTP client without a whitelist (SSRF)
#   OWA-09  A05: CSRF protection is implemented (SameSite cookies or CSRF tokens on state-changing requests)
#
# audit-validation:
#   VAL-01  All incoming data (body, params, query) goes through schema validation
#   VAL-02  Strings have maxLength, numbers have a range, enum values have a whitelist
#   VAL-03  JSON.parse is wrapped in try/catch followed by structure validation
#   VAL-04  Identity data is taken from the authenticated context (not from user input)
#   VAL-05  Nested structures and arrays are bounded (depth, minItems/maxItems)
#   VAL-06  The validator does not perform implicit coercion
#   VAL-07  Prototype pollution: merge/assign with user input filters out __proto__, constructor, prototype
#   VAL-08  File uploads: MIME type is verified by content, filename is sanitized, size is limited
#
# audit-errors:
#   ERR-01  Errors are not swallowed — catch blocks handle or rethrow
#   ERR-02  Internal details (stack trace, paths, versions) do not reach responses
#   ERR-03  Async handlers correctly propagate exceptions to the error middleware
#   ERR-04  Unhandled rejections and uncaught exceptions have process-level handlers
#   ERR-05  External calls (HTTP clients, DB) have explicit timeouts
#   ERR-06  Graceful shutdown is implemented — SIGTERM is handled
#   ERR-07  Error responses are consistent in structure across the entire application
#   ERR-08  Retry strategies use exponential backoff with jitter
#   ERR-09  AbortSignal/CancellationToken is propagated to external calls
#
# audit-logging:
#   LOG-01  Production code does not use console.log/console.error directly
#   LOG-02  PII is not logged (email, phone, names, addresses, financial data)
#   LOG-03  Secrets and tokens do not reach the logs
#   LOG-04  Requests are traced (a Request ID or end-to-end correlation ID)
#   LOG-05  Log format is structured (JSON) in production
#   LOG-06  Critical operations are logged (auth, create, update, delete)
#   LOG-07  User input is sanitized before logging (protection against log injection)
#   LOG-08  Critical security events are logged: login, logout, permission change, bulk data export
#
# audit-performance:
#   PER-01  No N+1: DB queries are not run inside loops
#   PER-02  DB result sets are bounded (LIMIT, pagination)
#   PER-03  Request handlers contain no blocking I/O
#   PER-04  CPU-intensive operations are moved off the main thread
#   PER-05  Independent async operations run in parallel
#   PER-06  Caches are bounded by size and lifetime (TTL + size limit)
#   PER-07  Event listeners and subscriptions are cleaned up on teardown
#   PER-08  No memory leaks: timers and closures do not hold large objects in a long-lived scope
#
# audit-architecture:
#   ARC-01  Business logic is moved out of route handlers into a service/domain layer
#   ARC-02  The presentation layer does not interact with the DB directly
#   ARC-03  No circular dependencies between modules
#   ARC-04  No god objects: files and classes have a single responsibility
#   ARC-05  Configuration and env variables are isolated in a config module
#   ARC-06  External dependencies are injected (DI), not imported directly
#   ARC-07  The domain layer does not import infrastructure modules
#
# audit-concurrency:
#   CON-01  async/await is not used in non-async iterators (forEach, map)
#   CON-02  Read-modify-write operations run inside transactions
#   CON-03  No shared mutable state at the module level (singletons, caches without locks)
#   CON-04  Module-level caches have an invalidation mechanism
#   CON-05  Event handlers and webhook handlers are idempotent
#   CON-06  Background async operations have a cancellation mechanism (AbortController/signal) and do not block graceful shutdown
#
# audit-naming:
#   NAM-01  Naming convention is followed consistently (camelCase/snake_case)
#   NAM-02  Variable, function, and class names describe purpose, not implementation
#   NAM-03  Boolean variables have predicate names (is/has/can/should)
#   NAM-04  Reader functions (get*/find*) have no side effects
#   NAM-05  Magic numbers and magic strings are replaced with named constants
#   NAM-06  Utility modules are not a dumping ground for unrelated code
#   NAM-07  Key entities are named in line with the domain glossary
#
# audit-yagni:
#   YAGNI-01  No commented-out code
#   YAGNI-02  No dead code — unused exports, functions, variables
#   YAGNI-03  Abstractions are justified: an interface/factory has >1 implementation or is required by tests
#   YAGNI-04  Feature flags are not pinned to a single value
#   YAGNI-05  Technical debt is current — no abandoned TODO/FIXME without a date or progress
#
# audit-reinvention:
#   REINV-01  No manual reimplementation of something already in the stdlib/language/runtime
#   REINV-02  No manual reimplementation of something an installed dependency already does
#   REINV-03  No semantic duplication of logic (identical code in ≥2 places instead of a shared utility)
#   REINV-04  Large mechanisms (ORM, DI, scheduler, logger, job queue) are not written from scratch when a mature solution exists
#
# audit-docs:
#   DOC-01  README/onboarding documents install/run/test/build, commands match package.json scripts
#   DOC-02  Env variables are in sync: those used in code are documented, none documented but unused
#   DOC-03  Internal links and paths in Markdown docs point to existing files and sections
#   DOC-04  Comments and JSDoc/docstrings do not contradict the code (signature, parameters, types, behavior)
#   DOC-05  The public surface (a library/package's exported API) has a doc comment
#   DOC-06  Project/architecture docs do not reference removed/renamed entities
#
# audit-bugs:
#   BUG-01  Type conversions are safe (NaN, radix, coercion)
#   BUG-02  async/await is used correctly (no await in forEach, no if(asyncFn()))
#   BUG-03  Null-safety is observed — property accesses are guarded against undefined/null
#   BUG-04  Functions do not mutate input arguments (sort, splice, object spread)
#   BUG-05  Exhaustive handling — all enum/union branches are handled
#   BUG-06  Mathematical guard conditions (division by zero, boundary values)
#   BUG-07  Off-by-one: range boundaries are correct (< vs <=, array indices, slice)
#   BUG-08  Float comparison does not use === for equality checks
#   BUG-09  Date/time is stored and processed in UTC, not local time
#   BUG-10  RegExp with user input has no catastrophic backtracking (ReDoS)
#
# audit-tests:
#   TST-01  TypeScript strict mode is enabled
#   TST-02  Coverage thresholds are configured and enforced in CI
#   TST-03  Pre-commit/pre-push hooks run checks (tests, lint, typecheck)
#   TST-04  Critical paths are covered by tests (auth, validation, error handling)
#   TST-05  Tests are isolated — no shared mutable state between tests
#   TST-06  No skipped or pinned tests (.only/.skip without justification)
#   TST-07  Tests check behavior, not implementation details
#   TST-08  No flaky tests (Math.random, Date.now without mock, sleep)
#   TST-09  Snapshot tests cover meaningful changes, not the entire DOM
#
# audit-deployment:
#   DEP-01  Docker images use pinned versions (no :latest)
#   DEP-02  Containers run as an unprivileged user (USER nonroot)
#   DEP-03  Multi-stage build separates dev and prod dependencies
#   DEP-04  .dockerignore excludes node_modules, .git, .env
#   DEP-05  HEALTHCHECK is defined in the Dockerfile
#   DEP-06  Secrets are not hardcoded in the Dockerfile (not in ENV)
#   DEP-07  .env is excluded from VCS
#   DEP-08  .env.example documents all environment variables
#   DEP-09  NODE_ENV is correctly set for production
#   DEP-10  npm ci is used instead of npm install in Docker
#   DEP-11  Container resource limits are defined (CPU limits, Memory limits)
#   DEP-12  The ability to run with a read-only root filesystem is verified
#
# audit-api-contracts:
#   API-01  Response shape is consistent — a single envelope or its absence across the whole API
#   API-02  HTTP status codes are semantically correct (201 on creation, 4xx for client errors)
#   API-03  Error responses are machine-readable and consistent in structure
#   API-04  Field naming is consistent (camelCase or snake_case, not mixed)
#   API-05  Stack traces and internal details do not reach error responses
#   API-06  Pagination includes metadata (total/hasNext) where applicable
#   API-07  The public API has a versioning strategy
