version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - unused
    - misspell
    - revive
  settings:
    revive:
      rules:
        # These errors are user-facing messages (now in English, for parity with
        # the TS version) and are intentionally capitalized, so we don't apply
        # the capitalization/punctuation rule to them.
        - name: error-strings
          disabled: true
    staticcheck:
      checks:
        - all
        - -ST1005 # error strings should not be capitalized — see above
  exclusions:
    rules:
      # In tests we allow unchecked errors from helper calls.
      - path: _test\.go
        linters:
          - errcheck

formatters:
  enable:
    - gofmt
    - goimports
